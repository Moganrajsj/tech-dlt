<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Communication Glow -->
  <circle cx="400" cy="400" r="300" fill="url(#contactGlow)" opacity="0.3"/>
  
  <!-- Holographic Head Base -->
  <path d="M 320 260 L 480 260 L 500 290 L 510 380 L 500 470 L 480 510 L 320 510 L 300 470 L 290 380 L 300 290 Z" 
        fill="rgba(59, 130, 246, 0.15)" stroke="#3B82F6" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Signal Waves -->
  <ellipse cx="400" cy="380" rx="80" ry="20" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7">
    <animate attributeName="rx" values="80;100;80" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="380" rx="120" ry="30" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.6">
    <animate attributeName="rx" values="120;140;120" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="380" rx="160" ry="40" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5">
    <animate attributeName="rx" values="160;180;160" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Scanline Effects -->
  <rect x="290" y="260" width="220" height="2" fill="#3B82F6" opacity="0.6">
    <animate attributeName="y" values="260;510;260" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="295" y="280" width="210" height="1" fill="#60A5FA" opacity="0.4">
    <animate attributeName="y" values="280;500;280" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Digital Glitch Lines -->
  <line x1="320" y1="320" x2="360" y2="320" stroke="#3B82F6" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="0.3s" repeatCount="indefinite"/>
  </line>
  <line x1="440" y1="340" x2="480" y2="340" stroke="#60A5FA" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="0.4s" repeatCount="indefinite"/>
  </line>
  <line x1="310" y1="420" x2="350" y2="420" stroke="#3B82F6" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="0.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Holographic Eyes -->
  <circle cx="360" cy="350" r="12" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="350" r="12" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="350" r="6" fill="#60A5FA" opacity="0.9"/>
  <circle cx="440" cy="350" r="6" fill="#60A5FA" opacity="0.9"/>
  
  <!-- Light Pulses -->
  <circle cx="400" cy="300" r="3" fill="#3B82F6">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="280" r="2" fill="#60A5FA">
    <animate attributeName="r" values="2;5;2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="280" r="2" fill="#60A5FA">
    <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Floating Holographic Particles -->
  <circle cx="280" cy="350" r="2" fill="#3B82F6" opacity="0.7">
    <animate attributeName="cy" values="350;340;350" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="370" r="2" fill="#60A5FA" opacity="0.7">
    <animate attributeName="cy" values="370;360;370" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="420" r="2" fill="#3B82F6" opacity="0.6">
    <animate attributeName="cx" values="270;265;270" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="440" r="2" fill="#60A5FA" opacity="0.6">
    <animate attributeName="cx" values="530;535;530" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Communication Icon -->
  <circle cx="400" cy="450" r="15" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <path d="M 390 445 L 400 455 L 410 445" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="contactGlow">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
