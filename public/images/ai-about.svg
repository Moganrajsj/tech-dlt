<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <circle cx="400" cy="400" r="300" fill="url(#aboutGlow)" opacity="0.3"/>
  
  <!-- Robot Head Outline -->
  <path d="M 300 250 L 500 250 L 520 280 L 520 480 L 500 520 L 300 520 L 280 480 L 280 280 Z" 
        fill="url(#headGradient)" stroke="#00BEF3" stroke-width="3" opacity="0.9"/>
  
  <!-- Transparent Panel -->
  <rect x="320" y="280" width="160" height="180" rx="10" fill="rgba(0, 190, 243, 0.1)" 
        stroke="#00BEF3" stroke-width="2"/>
  
  <!-- Neural Circuit Lines -->
  <path d="M 340 320 L 380 340 L 420 320 L 460 340" stroke="#00BEF3" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 340 360 L 360 380 L 400 370 L 440 380 L 460 360" stroke="#4DD4FF" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 340 400 L 370 420 L 430 420 L 460 400" stroke="#00BEF3" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Neural Nodes -->
  <circle cx="340" cy="320" r="4" fill="#00BEF3">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="340" r="4" fill="#4DD4FF">
    <animate attributeName="r" values="4;6;4" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="320" r="4" fill="#00BEF3">
    <animate attributeName="r" values="4;6;4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="340" r="4" fill="#4DD4FF">
    <animate attributeName="r" values="4;6;4" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Eyes -->
  <circle cx="360" cy="350" r="15" fill="#00BEF3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="350" r="15" fill="#00BEF3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Holographic Interface Elements -->
  <rect x="250" y="300" width="40" height="2" fill="#00BEF3" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="510" y="300" width="40" height="2" fill="#00BEF3" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="250" y="400" width="40" height="2" fill="#4DD4FF" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="510" y="400" width="40" height="2" fill="#4DD4FF" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="aboutGlow">
      <stop offset="0%" stop-color="#00BEF3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BEF3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F0F1E" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
</svg>
