<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Energy Glow -->
  <circle cx="400" cy="400" r="300" fill="url(#servicesGlow)" opacity="0.4"/>
  
  <!-- Sharp Angular Robot Head -->
  <path d="M 350 220 L 450 220 L 480 250 L 500 300 L 510 400 L 500 480 L 470 520 L 330 520 L 300 480 L 290 400 L 300 300 L 320 250 Z" 
        fill="url(#sharpGradient)" stroke="#A855F7" stroke-width="4" opacity="0.95"/>
  
  <!-- Energy Veins -->
  <path d="M 350 260 L 380 300 L 400 280 L 420 300 L 450 260" 
        stroke="url(#veinGradient)" stroke-width="3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 330 350 L 360 380 L 400 360 L 440 380 L 470 350" 
        stroke="url(#veinGradient2)" stroke-width="3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <path d="M 340 420 L 370 450 L 400 440 L 430 450 L 460 420" 
        stroke="#3B82F6" stroke-width="3" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Aggressive Eyes -->
  <polygon points="340,340 370,340 365,360 345,360" fill="#A855F7">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="430,340 460,340 455,360 435,360" fill="#A855F7">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Particle Sparks -->
  <circle cx="280" cy="300" r="3" fill="#3B82F6">
    <animate attributeName="cy" values="300;280;300" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="320" r="3" fill="#A855F7">
    <animate attributeName="cy" values="320;300;320" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="400" r="3" fill="#3B82F6">
    <animate attributeName="cx" values="270;260;270" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="420" r="3" fill="#A855F7">
    <animate attributeName="cx" values="530;540;530" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Circuit Tattoos -->
  <path d="M 320 380 L 340 400 L 320 420" stroke="#A855F7" stroke-width="2" opacity="0.7"/>
  <path d="M 480 380 L 460 400 L 480 420" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="servicesGlow">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sharpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F1F3A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="veinGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="veinGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
</svg>
